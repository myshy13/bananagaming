              }
            } catch {}
            gameButton.id = element.id
            gamesDiv.appendChild(gameButton)
          })

          function createTrendingBadge(gameButton) {
            gameButton.remove()
          }
        }
        gamesChanged = false
      }

      gamesChanged = true
      updateGames()

      document.body.innerHTML +=
        "<h1 style='text-align: center; margin-top: 2em;'>More games coming soon!</h1>"
      document.body.innerHTML +=
        "<p style='text-align: center; margin-top: 2em;'>Credit to aukak for a whole bunch of these games :D (<a href='https://github.com/aukak' target='_blank'>GitHub profile</a>)</p>"
    </script>
