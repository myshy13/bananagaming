      (() => {
        /**
         * This script injected by the installed three.js developer

         */

        const $devtoolsReady = Symbol("devtoolsReady");
        const $backlog = Symbol("backlog");

        // The __THREE_DEVTOOLS__ target is small and light-weight, and collects
        // events triggered until the devtools panel is ready, which is when
        // the events are flushed.
        const target = new (class ThreeDevToolsTarget extends EventTarget {
          constructor() {
            super();
            this[$devtoolsReady] = false;
            this[$backlog] = [];
            this.addEventListener(
              "devtools-ready",
              (e) => {
                this[$devtoolsReady] = true;
                for (let event of this[$backlog]) {
                  this.dispatchEvent(event);
                }
              },
              { once: true },
            );
          }

          dispatchEvent(event) {
            if (this[$devtoolsReady] || event.type === "devtools-ready") {
              super.dispatchEvent(event);
            } else {
              this[$backlog].push(event);
            }
          }
        })();

        Object.defineProperty(window, "__THREE_DEVTOOLS__", {
          value: target,
        });
      })();
    </script>

&lt;script&gt;
  // 2 saniye sonra reklam göster, sonra 5s geri sayımla X etkinleşecek.
  (function(){
    const showDelay = 2000; // ms
    const countdownStart = 5; // saniye
    const adContainer = document.getElementById(&apos;ad-container&apos;);
    const closeBtn = document.getElementById(&apos;close-ad&apos;);

    setTimeout(() =&gt; {
      // Göster
      adContainer.style.display = &apos;block&apos;;
      adContainer.setAttribute(&apos;aria-hidden&apos;,&apos;false&apos;);

      // Geri sayım başlat
      let timeLeft = countdownStart;
      closeBtn.textContent = `Kapat (${timeLeft})`;
      const t = setInterval(() =&gt; {
        timeLeft--;
        if (timeLeft &gt; 0) {
          closeBtn.textContent = `Kapat (${timeLeft})`;
        } else {
          clearInterval(t);
          closeBtn.disabled = false;
          closeBtn.classList.add(&apos;enabled&apos;);
          closeBtn.textContent = &apos;Kapat (X)&apos;;
        }
      }, 1000);

      // Kapatma
      closeBtn.addEventListener(&apos;click&apos;, () =&gt; {
        if (closeBtn.disabled) return;
        adContainer.remove();
      });

      // Fareyle sürüklenip taşınma vb. istenmiyorsa eklemeyin.
    }, showDelay);
  })();
