<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1, shrink-to-fit=no"
    />
    <title>DOOM</title>
    <script src="js-dos.js"></script>
    <style>
      canvas {
        image-rendering: pixelated;
        height: 100vh;
        width: 100vw;
      }
      body {
        margin: 0;
        padding: 0;
        overflow: hidden;
      }
    </style>
  </head>

  <body>
    <style>
      .header_bananagaming {
        position: absolute;
        height: 3em;
        width: 10em;
        top: 1em;
        left: 1em;
        border-radius: 50em;
        background-color: #ffffff36;
        color: black;
        display: flex;
        justify-content: center;
        align-items: center;
        transition: 0.2s ease;
        text-align: center;
        font-family: Arial, Helvetica, sans-serif;
        z-index: 100000000000;
      }

      .header_bananagaming:hover {
        background-color: #3a3a3a;
        color: white;
      }
    </style>
    <a
      class="header_bananagaming"
      href="https://bananagaming.vercel.app"
    >
      back to home
    </a>
    <center>
      <canvas></canvas>
      <br />
      <button
        onclick="ci.fullscreen()"
        style="visibility: hidden"
      >
        Fullscreen
      </button>
    </center>
    <script>
      Dos(document.getElementsByTagName("canvas")[0], { autolock: true }).ready((fs, main) => {
        fs.extract("DOOM.ZIP").then(() => {
          main(["-c", "DOOM"]).then((ci) => {
            window.ci = ci;
            document.getElementsByTagName("button")[0].style.visibility = "initial";
            document.title = "DOOM";
          });
        });
      });
    </script>
  </body>
</html>
