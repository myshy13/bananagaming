<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <meta
      name="viewport"
      content="width=device-width,initial-scale=1,minimum-scale=1,maximum-scale=1"
    />
    <title>Elastic Face</title>
    <link
      rel="stylesheet"
      href="face.css"
    />
  </head>
  <body>
    <style>
      .header_bananagaming {
        position: absolute;
        height: 3em;
        width: 10em;
        top: 1em;
        left: 1em;
        border-radius: 50em;
        background-color: #ffffff36;
        color: black;
        display: flex;
        justify-content: center;
        align-items: center;
        transition: 0.2s ease;
        text-align: center;
        font-family: Arial, Helvetica, sans-serif;
        z-index: 100000000000;
      }

      .header_bananagaming:hover {
        background-color: #3a3a3a;
        color: white;
      }
    </style>
    <a
      class="header_bananagaming"
      href="https://bananagaming.vercel.app"
    >
      back to home
    </a>
    <script
      type="text/template"
      id="loading-template"
    >
      <div id="loading-bar" class="loading-bar-visible">
      						<div id="loading-fill"></div>
      					</div>
    </script>
    <script
      type="text/template"
      id="no-support-template"
    >
      <div id="error">Your browser does not support the required features. Try another browser and/or device!</div>
    </script>
    <script
      type="text/template"
      id="main-template"
    >
      <div id="quality-container">
      						<div id="quality-label">Quality</div>
      						<div class="quality" id="quality-medium">Medium</div>
      						<div class="quality" id="quality-high">High</div>
      					</div>
    </script>
    <div id="placeholder"></div>
    <script src="face.js"></script>
  </body>
</html>
