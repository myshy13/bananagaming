<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0"
    />
    <title>Banana Gaming | arcade games</title>
    <link
      rel="stylesheet"
      crossorigin
      href="/style.css"
    />
    <meta
      name="description"
      content="Play free online games at Banana Gaming! Enjoy a variety of fun and exciting games directly in your browser. No downloads required!"
    />
  </head>
  <body>
    <div class="background"></div>
    <div
      class="games"
      id="games"
    ></div>
    <nav class="sidebar">
      <ul class="games">
        <li>
          <a href="/categories/arcade.html">
            <img
              src="/assets/arcade.svg"
              alt="arcade"
              class="categoryIcon"
            />Arcade</a
          >
        </li>
        <li>
          <a href="/categories/puzzle.html">
            <img
              src="/assets/puzzle.svg"
              alt="puzzle"
              class="categoryIcon"
            />Puzzle</a
          >
        </li>
        <li>
          <a href="/categories/skill.html">
            <img
              src="/assets/skill.svg"
              alt="skill"
              class="categoryIcon"
            />Skill</a
          >
        </li>
        <li>
          <a href="/categories/driving.html">
            <img
              src="/assets/driving.svg"
              alt="driving"
              class="categoryIcon"
            />Driving</a
          >
        </li>
        <li>
          <a href="/categories/idle.html">
            <img
              src="/assets/idle.svg"
              alt="idle"
              class="categoryIcon"
            />Idle</a
          >
        </li>
        <li>
          <a href="/categories/casual.html">
            <img
              src="/assets/casual.svg"
              alt="casual"
              class="categoryIcon"
            />Casual</a
          >
        </li>
        <li>
          <a href="/categories/platformer.html">
            <img
              src="/assets/platformer.svg"
              alt="platformer"
              class="categoryIcon"
            />Platformer</a
          >
        </li>
        <li>
          <a href="/categories/shooter.html">
            <img
              src="/assets/shooter.svg"
              alt="shooter"
              class="categoryIcon"
            />Shooter</a
          >
        </li>
        <li>
          <a href="/categories/sandbox.html">
            <img
              src="/assets/sandbox.svg"
              alt="sandbox"
              class="categoryIcon"
            />Sandbox</a
          >
        </li>
      </ul>
    </nav>
    <script>
      var games = [
        {
          name: "slope",
          path: "/games/slope/index.html",
          logoSrc: "/games/slope/logo.jpg",
        },
        {
          name: "a small world cup",
          path: "/games/asmallworldcup/index.html",
          logoSrc: "/games/asmallworldcup/logo.webp",
        },
        {
          name: "ultrakill",
          path: "/games/ultrakill/index.html",
          logoSrc: "/games/ultrakill/logo.png",
        },
        {
          name: "DOOM",
          path: "/games/webdoom/index.html",
          logoSrc: "/games/webdoom/logo.png",
        },
        {
          name: "mario kart",
          path: "/games/mariokart/index.html",
          logoSrc: "/games/mariokart/logo.jpeg",
        },
        {
          name: "mini golf",
          path: "/games/miniputt/index.html",
          logoSrc: "/games/miniputt/logo.jpg",
        },
        {
          name: "pacman",
          path: "/games/pacman/index.html",
          logoSrc: "/games/pacman/logo.png",
        },
        {
          name: "zombie defense",
          path: "/games/zombiedefense/index.html",
          logoSrc: "/games/zombiedefense/logo.png",
        },
        {
          name: "slope3",
          path: "/games/slope3/index.html",
          logoSrc: "/games/slope3/logo.webp",
        },
        {
          name: "tetris",
          path: "/games/tetris/index.html",
          logoSrc: "/games/tetris/logo.webp",
        },
        {
          name: "tiny fishing",
          path: "/games/tinyFishing/index.html",
          logoSrc: "/games/tinyFishing/logo.jpg",
        },
      ];

      games.forEach((element) => {
        const gamesDiv = document.getElementById("games");
        const gameButton = document.createElement("a");
        const gameLogo = document.createElement("img");
        const gameLabel = document.createElement("h4");

        // Set the alt attribute for the logo
        gameLogo.alt = `game logo: ${element.name}`;

        gameLogo.src = element.logoSrc;
        gameButton.className = "game";
        gameButton.href = element.path;
        gameButton.style.textDecoration = "none";
        gameButton.style.color = "white";
        gameLogo.style.borderRadius = "12px";
        gameLabel.textContent = element.name;
        gameButton.appendChild(gameLogo);
        gameButton.appendChild(gameLabel);
        gamesDiv.appendChild(gameButton);
      });
    </script>
  </body>
</html>
